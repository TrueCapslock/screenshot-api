services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: screenshot_api
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/screenshot_api
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: sh -c "node src/db/migrate.js && node src/index.js"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/screenshot_api
      REDIS_URL: redis://redis:6379
    depends_on:
      - postgres
      - redis
    command: node src/workers/renderer.js

volumes:
  pgdata:
